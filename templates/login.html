<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ site_name }} — Login</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--ac:{{ theme_color }};--ac-dim:{{ theme_color }}88;--ac-lite:{{ theme_color }}11;}
*{margin:0;padding:0;box-sizing:border-box}
body{background:#05000f;font-family:'JetBrains Mono',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
canvas{position:fixed;inset:0;z-index:0}
.container{position:relative;z-index:10;width:100%;max-width:380px;padding:16px}
.card{background:#0a0010;border:3px solid var(--ac);border-radius:12px;padding:36px 32px;box-shadow:0 0 40px var(--ac-lite)}
.logo{text-align:center;margin-bottom:18px}
.logo img{width:100px;height:100px;border-radius:50%;border:3px solid var(--ac);object-fit:cover;box-shadow:0 0 20px var(--ac),0 0 40px var(--ac-dim)}
.brand{text-align:center;font-size:22px;font-weight:700;color:var(--ac);letter-spacing:3px}
.sub{text-align:center;font-size:11px;color:var(--ac-dim);margin:8px 0 24px}
.prompt{color:var(--ac);margin-bottom:16px}
.cursor{display:inline-block;width:10px;height:15px;background:var(--ac);animation:blink 1s step-end infinite}
@keyframes blink{50%{opacity:0}}
.error-box{background:#2a0808;border:2px solid #ef4444;border-radius:8px;padding:10px;color:#f87171;margin-bottom:12px}
input{width:100%;padding:12px;background:#0d000d;border:2px solid var(--ac-dim);border-radius:8px;color:var(--ac);margin-bottom:12px}
.pw-wrap{position:relative}.pw-wrap input{padding-right:44px;margin-bottom:0}
.eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--ac);cursor:pointer}
.auth-btn{width:100%;padding:13px;background:transparent;border:3px solid var(--ac);color:var(--ac);border-radius:8px;margin-top:16px}
.admin-link{display:block;text-align:center;margin-top:12px;color:#fbbf24;text-decoration:none}
.footer{text-align:center;margin-top:20px;font-size:10px;color:var(--ac-dim)}
</style>
</head>
<body>
<canvas id="matrix"></canvas>
<div class="container">
<div class="card">
<div class="logo"><img src="https://i.ibb.co/Q7Ldhgq8/file-000000003d2471fb9520ebfbb8fb0331.png" alt="logo"></div>
<div class="brand">{{ site_name }}</div>
<div class="sub">SECURE TERMINAL V3.0</div>
<div class="prompt">&gt;_ LOGIN_REQUIRED<span class="cursor"></span></div>
{% if error %}<div class="error-box">▲ {{ error }}</div>{% endif %}
<form method="POST">
<input type="text" name="username" placeholder="Username" required>
<div class="pw-wrap">
<input id="pw" type="password" name="password" placeholder="Password" required>
<button type="button" class="eye-btn" onclick="togglePw()">👀</button>
</div>
<button class="auth-btn" type="submit">&gt;_ AUTHENTICATE</button>
</form>
<a class="admin-link" href="/admin/login">⚙️ ADMIN PANEL</a>
<div class="footer">JIHAD 〆24 HOSTING PANEL<br>UNAUTHORIZED ACCESS PROHIBITED</div>
</div></div>
<script>
function togglePw(){const p=document.getElementById('pw');p.type=p.type==='password'?'text':'password';}
const c=document.getElementById('matrix'),ctx=c.getContext('2d');
function rs(){c.width=innerWidth;c.height=innerHeight}rs();
const cols=Math.floor(c.width/16),drops=Array(cols).fill(1),ac=getComputedStyle(document.documentElement).getPropertyValue('--ac').trim();
setInterval(()=>{ctx.fillStyle='rgba(5,0,15,.05)';ctx.fillRect(0,0,c.width,c.height);ctx.fillStyle=ac;ctx.font='14px monospace';drops.forEach((y,i)=>{ctx.fillText(String.fromCharCode(0x30A0+Math.random()*96),i*16,y*16);if(y*16>c.height&&Math.random()>.975)drops[i]=0;drops[i]++;});},50);
addEventListener('resize',rs);
</script>
</body></html>
